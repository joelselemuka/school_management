components:
  schemas:
    ActionEnum:
      enum:
      - create
      - update
      - delete
      - view
      - export
      - login
      - logout
      - failed_login
      - permission_denied
      - other
      type: string
      description: |-
        * `create` - Création
        * `update` - Modification
        * `delete` - Suppression
        * `view` - Consultation
        * `export` - Export
        * `login` - Connexion
        * `logout` - Déconnexion
        * `failed_login` - Connexion Échouée
        * `permission_denied` - Permission Refusée
        * `other` - Autre
    Actualite:
      type: object
      description: Serializer pour les actualités.
      properties:
        id:
          type: integer
          readOnly: true
        titre:
          type: string
          maxLength: 250
        sous_titre:
          type: string
          maxLength: 300
        contenu:
          type: string
        categorie:
          allOf:
          - $ref: '#/components/schemas/CategorieEnum'
          title: Catégorie
        statut:
          $ref: '#/components/schemas/Statut730Enum'
        auteur:
          type: integer
          nullable: true
        auteur_details:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        annee_academique:
          type: integer
          title: Année académique
        image_principale:
          type: string
          format: uri
          nullable: true
        fichier_joint:
          type: string
          format: uri
          nullable: true
        est_une_alerte:
          type: boolean
          title: Marquer comme alerte importante
        est_epingle:
          type: boolean
          title: Épingler en haut
        date_publication:
          type: string
          format: date-time
          nullable: true
          title: Date de publication
        date_expiration:
          type: string
          format: date-time
          nullable: true
          title: Date d'expiration
        vues:
          type: integer
          readOnly: true
          title: Nombre de vues
        tags:
          type: string
          title: Tags (séparés par des virgules)
          maxLength: 200
        tags_list:
          type: array
          items: {}
          readOnly: true
        est_active:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - annee_academique
      - auteur_details
      - contenu
      - created_at
      - est_active
      - id
      - tags_list
      - titre
      - updated_at
      - vues
    ActualiteList:
      type: object
      description: Serializer simplifié pour les listes d'actualités.
      properties:
        id:
          type: integer
          readOnly: true
        titre:
          type: string
          maxLength: 250
        sous_titre:
          type: string
          maxLength: 300
        categorie:
          allOf:
          - $ref: '#/components/schemas/CategorieEnum'
          title: Catégorie
        statut:
          $ref: '#/components/schemas/Statut730Enum'
        auteur_nom:
          type: string
          readOnly: true
        image_principale:
          type: string
          format: uri
          nullable: true
        est_une_alerte:
          type: boolean
          title: Marquer comme alerte importante
        est_epingle:
          type: boolean
          title: Épingler en haut
        date_publication:
          type: string
          format: date-time
          nullable: true
          title: Date de publication
        vues:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: Nombre de vues
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - auteur_nom
      - created_at
      - id
      - titre
    ActualitePublique:
      type: object
      description: Serializer pour la consultation publique des actualités (sans champs
        sensibles).
      properties:
        id:
          type: integer
          readOnly: true
        titre:
          type: string
          maxLength: 250
        sous_titre:
          type: string
          maxLength: 300
        contenu:
          type: string
        categorie:
          allOf:
